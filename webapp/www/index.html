<!doctype html>
<html lang="">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Quarter - A personal time-tracker" />
        <meta name="theme-color" content="#f17aab" />

        <title>Quarter</title>

        <link rel="stylesheet" href="quarter.css" />
    </head>

    <body>
        <div class="application" id="quarter">
            <!-- The main navigation is present on all pages -->
            <nav class="main-navigation">
                <div class="main-navigation-item">
                    <svg class="icon">
                        <use xlink:href="#logo"></use>
                    </svg>
                </div>
                <ul>
                    <li class="main-navigation-item">
                        <svg class="icon">
                            <use xlink:href="#calendar"></use>
                        </svg>
                        <a href="#">Timesheet</a>
                    </li>
                    <li class="main-navigation-item">
                        <svg class="icon">
                            <use xlink:href="#chart-bar"></use>
                        </svg>
                        <a href="#">Reports</a>
                    </li>
                    <li class="main-navigation-item">
                        <svg class="icon">
                            <use xlink:href="#table"></use>
                        </svg>
                        <a href="#">Manage</a>
                    </li>
                </ul>
                <div class="main-navigation-item">
                    <div class="drop-down-initiator">
                        <svg class="icon">
                            <use xlink:href="#ellipsis-horizontal-circle"></use>
                        </svg>

                        <div class="drop-down-menu">
                            <div class="drop-down-menu-item">
                                <div class="content">
                                    <svg class="icon">
                                        <use xlink:href="#table"></use>
                                    </svg>
                                    <a href="#">Menu item A</a>
                                </div>
                            </div>
                            <div class="drop-down-menu-item">
                                <div class="content">
                                    <svg class="icon">
                                        <use xlink:href="#table"></use>
                                    </svg>
                                    <a href="#">Menu item B</a>
                                </div>
                            </div>
                            <div class="drop-down-menu-item">
                                <div class="content">
                                    <svg class="icon">
                                        <use xlink:href="#table"></use>
                                    </svg>
                                    <a href="#">Menu item C</a>
                                </div>
                            </div>
                            <hr class="separator"></hr>
                            <div class="drop-down-menu-item">
                                <div class="content">
                                    <svg class="icon">
                                        <use xlink:href="#table"></use>
                                    </svg>
                                    <a href="#">Menu item C</a>
                                </div>
                                <div class="appendix">Some extra text for a menu item</div>
                            </div>
                        </div>
                    </div>
                </div>






            </nav>
            <div class="calendar-month">
                <h1>October <span class="year">2025</pan></h1>
                <div class="calendar-month-day">
                    <div class="date">1</div>
                    <div class="day">Wednesday</div>
                    <div class="reported">
                        <span class="text-value">7.74</span>
                        <span class="text-unit">h</span>
                    </div>
                </div>
                <div class="calendar-month-day">
                    <div class="date">2</div>
                    <div class="day">Thursday</div>
                    <div class="reported">
                        <span class="text-value">4.00</span>
                        <span class="text-unit">h</span>
                    </div>
                </div>
                <div class="calendar-month-day">
                    <div class="date today">24</div>
                    <div class="day">Friday</div>
                    <div class="reported">
                        <span class="text-value">12.75</span>
                        <span class="text-unit">h</span>
                    </div>
                </div>
                <div class="calendar-month-day">
                    <div class="date">25</div>
                    <div class="day">Saturday</div>
                    <div class="reported">
                        <span class="text-value">0.00</span>
                        <span class="text-unit">h</span>
                    </div>
                </div>
                <div class="calendar-month-day">
                    <div class="date holiday">26</div>
                    <div class="day">Sunday</div>
                    <div class="reported">
                        <span class="text-value">0.00</span>
                        <span class="text-unit">h</span>
                    </div>
                </div>
                <div class="calendar-month-day">
                    <div class="date">27</div>
                    <div class="day">Monday</div>
                    <div class="reported">
                        <span class="text-value">6.00</span>
                        <span class="text-unit">h</span>
                    </div>
                </div>
            </div>
        </div>

        <script type="module" src="./quarter.js"></script>

        <!-- All icons used in quarter comes from heroicons.com -->
        <svg
            aria-hidden="true"
            style="position: absolute; width: 0; height: 0; overflow: hidden"
            xmlns="http://www.w3.org/2000/svg"
        >
            <symbol id="logo" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 1 0 7.5 7.5h-7.5V6Z" />
            </symbol>

            <symbol id="char-pie" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 1 0 7.5 7.5h-7.5V6Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0 0 13.5 3v7.5Z" />
            </symbol>

            <symbol id="clock" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                />
            </symbol>

            <symbol id="profile" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                />
            </symbol>

            <symbol id="calendar" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5m-9-6h.008v.008H12v-.008ZM12 15h.008v.008H12V15Zm0 2.25h.008v.008H12v-.008ZM9.75 15h.008v.008H9.75V15Zm0 2.25h.008v.008H9.75v-.008ZM7.5 15h.008v.008H7.5V15Zm0 2.25h.008v.008H7.5v-.008Zm6.75-4.5h.008v.008h-.008v-.008Zm0 2.25h.008v.008h-.008V15Zm0 2.25h.008v.008h-.008v-.008Zm2.25-4.5h.008v.008H16.5v-.008Zm0 2.25h.008v.008H16.5V15Z"
                />
            </symbol>

            <symbol id="chart-bar" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"
                />
            </symbol>

            <symbol id="chart-bar-square" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0 0 20.25 18V6A2.25 2.25 0 0 0 18 3.75H6A2.25 2.25 0 0 0 3.75 6v12A2.25 2.25 0 0 0 6 20.25Z"
                />
            </symbol>

            <symbol id="table" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 0 1-1.125-1.125M3.375 19.5h7.5c.621 0 1.125-.504 1.125-1.125m-9.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-7.5A1.125 1.125 0 0 1 12 18.375m9.75-12.75c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125m19.5 0v1.5c0 .621-.504 1.125-1.125 1.125M2.25 5.625v1.5c0 .621.504 1.125 1.125 1.125m0 0h17.25m-17.25 0h7.5c.621 0 1.125.504 1.125 1.125M3.375 8.25c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m17.25-3.75h-7.5c-.621 0-1.125.504-1.125 1.125m8.625-1.125c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125M12 10.875v-1.5m0 1.5c0 .621-.504 1.125-1.125 1.125M12 10.875c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125M13.125 12h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125M20.625 12c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h7.5M12 14.625v-1.5m0 1.5c0 .621-.504 1.125-1.125 1.125M12 14.625c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125m0 1.5v-1.5m0 0c0-.621.504-1.125 1.125-1.125m0 0h7.5"
                />
            </symbol>

            <svg
                id="ellipsis-horizontal-circle"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                />
            </svg>
        </svg>
    </body>
</html>
