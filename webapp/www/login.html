<!doctype html>
<html lang="">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Quarter - A personal time-tracker" />

        <title>Sign in - Quarter</title>

        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='1.5' stroke='currentColor' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='10'%3E%3C/circle%3E%3Cpath d='M12 12V2.5A9.5 9.5 0 0 1 21.5 12H12z' fill='currentColor' stroke='none'%3E%3C/path%3E%3Cline x1='12' y1='12' x2='12' y2='2'%3E%3C/line%3E%3Cline x1='12' y1='12' x2='22' y2='12'%3E%3C/line%3E%3C/svg%3E"
        />
        <link rel="stylesheet" href="quarter.css" />
        <meta name="theme-color" content="#fdfbf8" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#1e2422" media="(prefers-color-scheme: dark)" />
    </head>

    <body>
        <div class="application">
            <div class="application-layout">
                <nav class="main-navigation">
                    <div class="main-navigation-item">
                        <a class="logo" href="/ui"
                            ><svg class="icon"><use href="#quarter-logo"></use></svg>QUARTER</a
                        >
                    </div>
                </nav>

                <div class="content">
                    <section class="hero">
                        <div class="hero-left">
                            <p class="hero-eyebrow">Personal Time Tracking</p>
                            <h1 class="hero-title">Sign in</h1>
                            <p class="hero-desc">
                                The page you were trying to reach requires you to be signed in. Choose a method below
                                to continue.
                            </p>

                            <div class="signin-actions">
                                <a href="/account/login/github" class="button outline">
                                    <svg class="icon">
                                        <use href="#github-logo"></use></svg
                                    >Continue with GitHub</a
                                >
                                <a href="/account/login/google" class="button outline">
                                    <svg class="icon">
                                        <use href="#google-logo"></use>
                                    </svg>
                                    Continue with Google</a
                                >
                                <p class="fine-print">Open source. Free to use. No SLA. No guarantees.</p>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <!-- All icons used in quarter comes from heroicons.com -->
        <svg
            aria-hidden="true"
            style="position: absolute; width: 0; height: 0; overflow: hidden"
            xmlns="http://www.w3.org/2000/svg"
        >
            <symbol
                id="quarter-logo"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <circle cx="12" cy="12" r="10" />
                <path d="M12 12V2.5A9.5 9.5 0 0 1 21.5 12H12z" fill="currentColor" stroke="none" />
                <line x1="12" y1="12" x2="12" y2="2" />
                <line x1="12" y1="12" x2="22" y2="12" />
            </symbol>

            <symbol
                id="google-logo"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path
                    d="M20.3 12.2c0-.6-.1-1.2-.2-1.8H12v3.4h4.7c-.2 1-.8 1.9-1.7 2.5v2h2.7c1.6-1.5 2.6-3.7 2.6-6.1z"
                />
                <path
                    d="M12 21c2.4 0 4.4-.8 5.9-2.1l-2.7-2c-.8.6-1.9.9-3.2.9-2.4 0-4.5-1.6-5.2-3.8H4v2.1C5.5 19.1 8.5 21 12 21z"
                />
                <path d="M6.8 14c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V8H4C3.4 9.2 3 10.6 3 12s.4 2.8 1 4l2.8-2z" />
                <path
                    d="M12 6.2c1.4 0 2.6.5 3.5 1.3l2.6-2.6C16.4 3.5 14.4 2.6 12 2.6 8.5 2.6 5.5 4.5 4 7.4l2.8 2.2C7.5 7.8 9.6 6.2 12 6.2z"
                />
            </symbol>

            <symbol
                id="github-logo"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                />
            </symbol>
        </svg>
    </body>
</html>
